<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write a Review — Cars Dealership</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: white; min-height: 100vh; }

        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 16px 60px;
            background: rgba(15,15,26,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: space-between;
        }
        .navbar-brand { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .back-btn { padding: 8px 18px; border-radius: 10px; border: 1.5px solid rgba(99,102,241,0.4); color: #a78bfa; background: transparent; font-weight: 600; font-size: 0.85rem; font-family: 'Inter', sans-serif; text-decoration: none; }

        .page { padding: 110px 60px 60px; max-width: 700px; margin: 0 auto; }

        .page-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
        .page-title span { background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-sub { color: rgba(255,255,255,0.45); font-size: 0.9rem; margin-bottom: 36px; }

        .review-form {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 36px; position: relative; overflow: hidden;
        }
        .review-form::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #6366f1, #a78bfa, #f59e0b);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.78rem; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 8px; letter-spacing: 0.07em; text-transform: uppercase; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;
            font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #6366f1; background: rgba(99,102,241,0.08); }
        .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255,255,255,0.25); }
        .form-group select option { background: #1a1a2e; color: white; }
        .form-group textarea { resize: vertical; min-height: 130px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; }
        .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #6366f1; }
        .checkbox-row label { font-size: 0.9rem; color: rgba(255,255,255,0.7); text-transform: none; letter-spacing: 0; margin: 0; }

        .btn-submit-review {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none;
            border-radius: 14px; color: white; font-size: 1rem; font-weight: 700; cursor: pointer;
            font-family: 'Inter', sans-serif; margin-top: 8px; transition: all 0.25s;
            box-shadow: 0 8px 25px rgba(99,102,241,0.35);
        }
        .btn-submit-review:hover { transform: translateY(-2px); box-shadow: 0 14px 35px rgba(99,102,241,0.5); }

        .success-banner {
            background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
            border-radius: 14px; padding: 20px 24px; text-align: center;
            color: #34d399; font-weight: 600; display: none; margin-top: 20px;
        }
        .error-banner {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 14px; padding: 14px 18px; color: #f87171; font-size: 0.9rem;
            display: none; margin-bottom: 18px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="/">🚗 Cars Dealership</a>
    <a href="/djangoapp/dealer/{{ dealer_id }}/" class="back-btn">← Back to Dealer</a>
</nav>

<div class="page">
    <div class="page-title">Write a <span>Review</span></div>
    <div class="page-sub">Share your experience at Dealer #{{ dealer_id }}</div>

    <div class="review-form">
        <div class="error-banner" id="errorBanner"></div>
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="reviewerName" placeholder="Full name" value="{{ request.user.get_full_name }}">
        </div>
        <div class="form-group">
            <label>Your Review</label>
            <textarea id="reviewText" placeholder="Describe your experience at this dealership..."></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Car Make</label>
                <select id="carMake" onchange="filterModels()">
                    <option value="">Select Make</option>
                    {% for car in cars %}
                    <option value="{{ car.car_make.name }}">{{ car.car_make.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Car Model</label>
                <select id="carModel">
                    <option value="">Select Model</option>
                    {% for car in cars %}
                    <option data-make="{{ car.car_make.name }}" value="{{ car.name }}">{{ car.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Car Year</label>
                <input type="number" id="carYear" placeholder="e.g. 2023" min="2000" max="2025">
            </div>
            <div class="form-group">
                <label>Purchase Date</label>
                <input type="date" id="purchaseDate">
            </div>
        </div>
        <div class="form-group">
            <div class="checkbox-row">
                <input type="checkbox" id="purchased">
                <label for="purchased">I purchased a vehicle at this dealership</label>
            </div>
        </div>
        <button class="btn-submit-review" onclick="submitReview()">Submit Review ✨</button>
        <div class="success-banner" id="successBanner">
            ✅ Your review was submitted successfully! Redirecting...
        </div>
    </div>
</div>

<script>
const dealerId = {{ dealer_id }};

function filterModels() {
    const make = document.getElementById('carMake').value;
    const modelSelect = document.getElementById('carModel');
    Array.from(modelSelect.options).forEach(opt => {
        opt.style.display = (!opt.dataset.make || opt.dataset.make === make) ? '' : 'none';
    });
    modelSelect.value = '';
}

async function submitReview() {
    const name = document.getElementById('reviewerName').value.trim();
    const review = document.getElementById('reviewText').value.trim();
    const car_make = document.getElementById('carMake').value;
    const car_model = document.getElementById('carModel').value;
    const car_year = parseInt(document.getElementById('carYear').value);
    const purchase_date = document.getElementById('purchaseDate').value;
    const purchase = document.getElementById('purchased').checked;

    if (!name || !review || !car_make || !car_model || !car_year || !purchase_date) {
        const err = document.getElementById('errorBanner');
        err.textContent = 'Please fill in all fields.';
        err.style.display = 'block';
        return;
    }

    const payload = { name, review, dealership: dealerId, car_make, car_model, car_year, purchase_date, purchase };
    const res = await fetch('/djangoapp/add_review/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
        body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.status === 200) {
        document.getElementById('successBanner').style.display = 'block';
        setTimeout(() => { window.location = `/djangoapp/dealer/${dealerId}/`; }, 2000);
    } else {
        const err = document.getElementById('errorBanner');
        err.textContent = data.message || 'Failed to submit review.';
        err.style.display = 'block';
    }
}
</script>
</body>
</html>
